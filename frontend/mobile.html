<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📱 모바일 가상 NFC 스코어 리더기</title>
  <!-- Google Fonts 로드 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Nanum+Pen+Script&family=Gowun+Dodum&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="theme.css">
  <style>
    /* 모바일 전용 보정 스타일 */
    .mobile-body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-gradient);
    }
    
    .mobile-device {
      width: 100%;
      max-width: 410px;
      height: 100vh;
      max-height: 840px;
      background: var(--card-bg-glass);
      backdrop-filter: blur(20px);
      border: 2px solid var(--primary-color);
      border-radius: 40px;
      box-shadow: 0 20px 50px var(--shadow-color);
      padding: 2.5rem 1.8rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    @media (max-width: 450px) {
      .mobile-device {
        height: 100vh;
        max-height: none;
        border-radius: 0;
        border: none;
      }
    }

    .mobile-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .mobile-header .app-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      animation: float-animation 3s ease-in-out infinite;
      display: inline-block;
    }

    .mobile-header h1 {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 1.6rem;
      background: var(--text-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 점수 선택기 디자인 */
    .score-select-section {
      text-align: center;
      margin: 1.5rem 0;
    }

    .score-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    .score-chips {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
    }

    .score-chip {
      border: 2px solid var(--primary-color);
      background: transparent;
      color: var(--text-color);
      padding: 0.8rem 1.2rem;
      border-radius: 20px;
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
      flex: 1;
    }

    .score-chip.selected {
      background: var(--primary-color);
      color: var(--theme-btn-active-text);
      box-shadow: 0 5px 15px var(--shadow-color);
    }

    /* 카드 시뮬레이터 */
    .tag-sim-section {
      background: rgba(255, 255, 255, 0.4);
      padding: 1.5rem;
      border-radius: 25px;
      border: 1px solid var(--border-color);
      text-align: center;
      margin: 1.5rem 0;
    }

    .student-select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 15px;
      border: 2px solid var(--primary-color);
      font-family: var(--font-body);
      font-size: 1.05rem;
      background: #fff;
      outline: none;
      color: var(--text-color);
      text-align: center;
      margin-bottom: 1rem;
    }

    .custom-tag-input {
      width: 100%;
      padding: 0.8rem;
      border-radius: 15px;
      border: 2px solid var(--primary-color);
      font-family: var(--font-title);
      font-size: 1.05rem;
      background: #fff;
      outline: none;
      text-align: center;
      display: none;
    }

    .input-mode-toggle {
      font-size: 0.9rem;
      color: var(--text-color);
      text-decoration: underline;
      cursor: pointer;
      opacity: 0.8;
    }

    /* 전송 대형 버튼 */
    .btn-nfc-trigger {
      width: 100%;
      padding: 1.5rem;
      border-radius: 30px;
      border: none;
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 1.4rem;
      cursor: pointer;
      background: var(--primary-color);
      color: var(--theme-btn-active-text);
      box-shadow: 0 10px 25px var(--shadow-color);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-nfc-trigger:active {
      transform: scale(0.96);
      box-shadow: 0 5px 10px var(--shadow-color);
    }

    .device-footer {
      text-align: center;
      font-size: 0.85rem;
      opacity: 0.6;
      margin-top: 1rem;
    }
  </style>
</head>
<body class="theme-honeybee mobile-body">

  <div class="mobile-device">
    
    <!-- 1. 앱 헤더 및 테마 선택 -->
    <header class="mobile-header">
      <div class="app-icon" id="app-mascot">🐝</div>
      <h1>NFC 스코어 리더기</h1>
      
      <!-- 테마 토글 (대시보드와 공통 일관성 유지) -->
      <div class="theme-selector" style="margin-top: 1rem; justify-content: center;">
        <button class="theme-btn active" data-theme="honeybee">🐝</button>
        <button class="theme-btn" data-theme="ocean">🐬</button>
        <button class="theme-btn" data-theme="kids">🎈</button>
      </div>
    </header>

    <!-- 2. 점수 선택 영역 -->
    <section class="score-select-section">
      <div class="score-title">부여할 점수 선택</div>
      <div class="score-chips">
        <button class="score-chip selected" data-score="10">+10</button>
        <button class="score-chip" data-score="5">+5</button>
        <button class="score-chip" data-score="1">+1</button>
        <button class="score-chip" data-score="-5">-5</button>
      </div>
    </section>

    <!-- 3. 가상 태깅 및 리더기 영역 -->
    <section class="tag-sim-section">
      <div class="score-title">태그할 대상 (NFC 카드)</div>
      
      <!-- 기존 학생 드롭다운 선택 -->
      <select id="student-dropdown" class="student-select">
        <option value="">-- 학생 선택 (스캔 대상) --</option>
        <!-- API로 바인딩 -->
      </select>

      <!-- 미등록 카드 시뮬레이션을 위한 커스텀 직접 입력 -->
      <input type="text" id="tag-id-input" class="custom-tag-input" placeholder="임의의 8자리 카드 ID (예: 99XX88OO)">
      
      <div class="input-mode-toggle" id="toggle-input-mode">미등록 카드 직접 태깅하기</div>
    </section>

    <!-- 4. 태그 인식 및 점수 전송 실행 버튼 -->
    <footer>
      <button class="btn-nfc-trigger" id="btn-nfc-scan">📳 점수 부여 (NFC 태그)</button>
      <div class="device-footer">1단계 가상 NFC 리더기 시뮬레이터</div>
    </footer>

  </div>

  <script>
    const API_BASE_URL = 'http://localhost:3000';
    let selectedScore = 10;
    let inputMode = 'select'; // select or text
    let currentTheme = 'honeybee';
    
    const THEME_ICONS = {
      honeybee: '🐝',
      ocean: '🐬',
      kids: '🎈'
    };

    document.addEventListener('DOMContentLoaded', () => {
      fetchCurrentTheme();
      initThemeSwitcher();
      initScoreSelector();
      initInputModeToggler();
      fetchStudentOptions();
      
      document.getElementById('btn-nfc-scan').addEventListener('click', submitScore);
    });

    // 서버 전역 테마 상태 가져오기
    async function fetchCurrentTheme() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/theme`);
        const data = await res.json();
        setThemeLocal(data.theme);
      } catch (err) {
        console.error('Failed to load current theme:', err);
      }
    }

    // 1. 테마 셀렉터 초기화
    function initThemeSwitcher() {
      const buttons = document.querySelectorAll('.theme-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', async () => {
          const theme = btn.dataset.theme;
          
          // 1. 로컬 화면 적용
          setThemeLocal(theme);

          // 2. 서버로 동기화 전송
          try {
            await fetch(`${API_BASE_URL}/api/theme`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ theme: theme })
            });
          } catch (err) {
            console.error('Failed to sync theme to server:', err);
          }
        });
      });
    }

    // 로컬 화면 테마 변경 유틸
    function setThemeLocal(theme) {
      currentTheme = theme;
      document.body.className = `theme-${theme} mobile-body`;
      document.getElementById('app-mascot').textContent = THEME_ICONS[theme];
      
      const buttons = document.querySelectorAll('.theme-btn');
      buttons.forEach(btn => {
        if (btn.dataset.theme === theme) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    // 2. 점수 칩 선택 처리
    function initScoreSelector() {
      const chips = document.querySelectorAll('.score-chip');
      chips.forEach(chip => {
        chip.addEventListener('click', () => {
          selectedScore = parseInt(chip.dataset.score);
          chips.forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
        });
      });
    }

    // 3. 입력 모드 토글 (기존 학생 vs 미등록 태깅)
    function initInputModeToggler() {
      const toggleBtn = document.getElementById('toggle-input-mode');
      const dropdown = document.getElementById('student-dropdown');
      const input = document.getElementById('tag-id-input');

      toggleBtn.addEventListener('click', () => {
        if (inputMode === 'select') {
          dropdown.style.display = 'none';
          input.style.display = 'block';
          toggleBtn.textContent = '학생 목록에서 선택하기';
          inputMode = 'text';
          input.focus();
        } else {
          dropdown.style.display = 'block';
          input.style.display = 'none';
          toggleBtn.textContent = '미등록 카드 직접 태깅하기';
          inputMode = 'select';
        }
      });
    }

    // 4. 학생 목록 가져오기
    async function fetchStudentOptions() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/students`);
        const students = await res.json();
        const dropdown = document.getElementById('student-dropdown');
        
        dropdown.innerHTML = '<option value="">-- 학생 선택 (스캔 대상) --</option>';
        students.forEach(student => {
          const opt = document.createElement('option');
          opt.value = student.rfid_id;
          opt.textContent = `${student.name} (${student.rfid_id})`;
          dropdown.appendChild(opt);
        });
      } catch (err) {
        console.error('Failed to load students for mobile dropdown:', err);
      }
    }

    // 5. 점수 전송 API 호출
    async function submitScore() {
      let rfidId = '';
      if (inputMode === 'select') {
        rfidId = document.getElementById('student-dropdown').value;
        if (!rfidId) {
          alert('태그할 학생을 먼저 선택해주세요.');
          return;
        }
      } else {
        rfidId = document.getElementById('tag-id-input').value.trim();
        if (!rfidId) {
          alert('태그할 가상의 카드 ID를 입력해주세요.');
          return;
        }
      }

      // 진동 피드백 (모바일 기기 전용)
      if (navigator.vibrate) {
        navigator.vibrate(100);
      }

      try {
        const response = await fetch(`${API_BASE_URL}/api/score`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            rfid_id: rfidId,
            score_added: selectedScore
          })
        });

        const data = await response.json();
        
        if (response.ok) {
          alert(`🎯 전송 성공!\n${data.student.name}: ${selectedScore}점 부여 완료`);
          if (inputMode === 'text') {
            document.getElementById('tag-id-input').value = '';
          }
        } else {
          if (data.error === 'unknown_tag') {
            alert(`⚠️ 미등록 카드 스캔 알림이 웹 대시보드에 전송되었습니다.\n웹 대시보드에서 등록창을 확인하세요!`);
          } else {
            alert(`오류: ${data.error}`);
          }
        }
      } catch (err) {
        console.error('API Error:', err);
        alert('서버와 통신할 수 없습니다.');
      }
    }
  </script>
</body>
</html>
